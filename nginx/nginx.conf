# AyitiMarket — Nginx reverse proxy with HTTPS + security headers
# Place SSL certs in /etc/nginx/ssl/  (managed by Certbot or manually)
# Replace ayitimarket.ht with your real domain

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ayitimarket.ht www.ayitimarket.ht;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ayitimarket.ht www.ayitimarket.ht;

    # ── SSL certificates (Let's Encrypt via Certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/ayitimarket.ht/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayitimarket.ht/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                            always;
    add_header X-Content-Type-Options     nosniff                                         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"      always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: ws:; font-src 'self' https:; object-src 'none'; frame-ancestors 'none';" always;

    # ── Nginx rate limiting ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;

    # ── API — proxy to Node.js backend ────────────────────────────────────
    location /api/ {
        limit_req zone=general burst=30 nodelay;

        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_buffer_size    16k;
        proxy_buffers        4 32k;
    }

    # Stricter rate limit on auth endpoints
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── WebSocket ─────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Admin frontend (/admin/*) ─────────────────────────────────────────
    location /admin/ {
        alias /var/www/admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Client frontend (everything else) ────────────────────────────────
    location / {
        root /var/www/client;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Deny hidden files (.env, .git, etc.) ──────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    client_max_body_size 4m;
}
