version: '3.9'

services:

  # ── Node.js API backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./Marketayiti/backend
      dockerfile: Dockerfile
    container_name: ayiti_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PORT=4000
      - DATABASE_PATH=/data/ayiti_market.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - ALLOWED_ORIGINS=https://ayitimarket.ht,https://www.ayitimarket.ht
    volumes:
      - db_data:/data
      - backend_logs:/app/logs
    expose:
      - "4000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx reverse proxy (HTTPS termination) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ayiti_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Marketayiti/frontend-client/dist:/var/www/client:ro
      - ./Marketayiti/frontend-admin/dist:/var/www/admin:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - backend

  # ── Certbot (Let's Encrypt SSL) ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: ayiti_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run manually: docker compose run certbot certonly --webroot -w /var/www/certbot -d ayitimarket.ht -d www.ayitimarket.ht
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  db_data:
  backend_logs:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
